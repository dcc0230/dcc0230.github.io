title: Página de Diego Castañeda Cortés
description: Curtido por las advesidades que tuvo que enfrentar desde su nacimiento, Miguel Hernández se enfrentó a la vida con actitud ejemplar. Ante la imposibilidad de estudiar más allá del nivel elemental no se resignó a su suerte y se volvió autodidacta. De un humilde pastor de cabras llegó a ser uno de los Poetas más importantes de la Generación del 27. Pastor y Poeta, se volvió soldado cuando vio amenazado el futuro de su Patria. Fue entonces un hombre que empuñó con destreza y decisión el cayado, la pluma y el fusil. Sobrevivió a las penurias y al combate, pero fue detenido al regresar a Orihuela, su amado pueblo natal. Los traidores quisieron silenciar al hombre sereno "de su estirpe defensor" dejándolo cautivo en una fría celda. Dicen que lo mataron... bueno... ahora su voz se escucha mejor.
